services:
  redis:
    image: redis:7-alpine
    container_name: redis-state
    ports:
      - "6379:6379"
    networks:
      - distributed-network

  # --- LOCK MANAGERS (RAFT) ---
  lock-1:
    build: { context: .., dockerfile: docker/Dockerfile.node }
    container_name: lock-1
    environment:
      - NODE_ID=lock-1
      - PORT=8000
      - HOST=0.0.0.0
      - NEIGHBORS=http://lock-2:8000,http://lock-3:8000
      - REDIS_HOST=redis
    ports: ["8001:8000"]
    networks: [distributed-network]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  lock-2:
    build: { context: .., dockerfile: docker/Dockerfile.node }
